version: 2

models:
  - name: fct_transactions
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: card_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_card')
                field: card_id
      - name: merchant_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_merchant')
                field: merchant_id